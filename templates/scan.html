<form method="POST" action="/scan" enctype="multipart/form-data">
    <input type="hidden" name="language" id="language-hidden" value="python">
    <textarea name="code" rows="20"
        placeholder="# Paste your code here...
# OR upload a file below"
        style="width: 100%; background: #0d0f17; border: none; border-bottom: 1px solid #2e3352; color: #e8eaf0; font-family: monospace; font-size: 13px; padding: 20px; resize: vertical;"></textarea>

    <div style="padding: 16px 24px; border-bottom: 1px solid #2e3352;">
        <label style="color: #8b90a8; font-size: 13px; display: block; margin-bottom: 8px;">Or upload a file (.py, .js, .php, .java)</label>
        <input type="file" name="file" accept=".py,.js,.php,.java,.txt"
            style="color: #e8eaf0; font-size: 13px;">
    </div>

    <div style="padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;">
        <span style="color: #8b90a8; font-size: 13px;">Paste code above or upload a file</span>
        <button type="submit" class="btn btn-primary">Run security scan →</button>
    </div>
</form>
